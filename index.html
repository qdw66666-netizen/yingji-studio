<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>影迹 Studio Pro</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<h1>影迹 <span>Studio Pro</span></h1>
<p>摄影师工作管理系统</p>
</header>

<section class="card dashboard">
<h2>工作驾驶舱</h2>
<div class="grid">
<div>📷 项目<br><b id="projectCount">0</b></div>
<div>💰 收入<br><b id="income">¥0</b></div>
<div>🎨 修图中<br><b id="editing">0</b></div>
<div>📦 待交付<br><b id="delivery">0</b></div>
</div>
</section>

<section class="card">
<h2>新建项目</h2>
<input id="name" placeholder="项目名称">
<input id="client" placeholder="客户姓名">
<input id="type" placeholder="拍摄类型">
<input id="money" placeholder="订单金额" type="number">
<input id="progress" placeholder="修图进度 0-100" type="number" min="0" max="100">
<button onclick="addProject()">保存项目</button>
</section>

<section class="card">
<h2>项目列表</h2>
<div id="list"></div>
</section>

<nav>
首页　客户　项目　数据　我的
</nav>

<script src="app.js"></script>
</body>
</html>
