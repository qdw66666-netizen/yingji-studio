<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>闹闹 Studio Pro</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>
<header>
<h1>闹闹 <span>Studio Pro</span></h1>
<p>摄影工作室管理系统</p>
</header>

<div class="card">
<h2>今日工作</h2>
<div class="grid">
<div>📅档期<br><b id="schedule">0</b></div>
<div>👀未晒图<br><b id="unsent">0</b></div>
<div>🎨未修图<br><b id="editing">0</b></div>
<div>📦待交付<br><b id="delivery">0</b></div>
</div>
</div>

<div class="card">
<h2>新建项目</h2>
<input id="name" placeholder="项目名称">
<input id="client" placeholder="客户姓名">
<select id="status">
<option>已拍摄</option>
<option>未晒图</option>
<option>未修图</option>
<option>修图中</option>
<option>待交付</option>
<option>已交付</option>
</select>
<input id="money" placeholder="订单金额" type="number">
<button onclick="add()">保存项目</button>
</div>

<div class="card">
<h2>项目中心</h2>
<div id="list"></div>
</div>

<nav>首页　客户　项目　数据　我的</nav>
<script src="app.js"></script>
</body>
</html>
